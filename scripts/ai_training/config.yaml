# ---------------------------------------------------------------------------
# Fine-tuning pipeline configuration.
#
# Everything in this file is read by the scripts under scripts/ai_training/.
# The defaults are what the pipeline ships with; override by editing this
# file (the pipeline is idempotent — re-run end to end and you get a new
# tagged Ollama model).
# ---------------------------------------------------------------------------

# The Hugging Face repo the LoRA sits on top of. MUST be a *real* HF repo
# — mlx_lm pulls it with `mlx_lm.convert --hf-path <this>`.
#
# Defaults to Llama 3.2 3B Instruct — text-only, instruction-tuned, ~6 GB
# BF16 / ~2 GB at Q4_K_M. ~80 tok/s decode on M4 Max (roughly 2× faster
# than Gemma 3 4B). Llama 3.x is notably stronger than Gemma 3 at SQL,
# JSON, and structured output in this size class — a good fit for the
# fast-tier router (RAG / schema Q&A / classification).
#
# Crucially, this checkpoint sails through the whole pipeline cleanly:
#   - mlx-lm loads it natively (text-only, no `language_model.*` wrapper)
#   - llama.cpp's convert_hf_to_gguf.py recognises the tokenizer hash
#     out of the box (no whitelist patching required)
#   - Ollama has first-class Llama 3 chat-template support
#
# WHY NOT GEMMA 4 / LLAMA 4? Both released as multimodal MoE checkpoints
# (text + image + audio decoder inside a `language_model.*` namespace).
# As of mlx-lm 0.31 / llama.cpp main, neither has a clean fine-tune →
# fuse → GGUF path — the same toolchain pain blocked our v1 + v2 runs
# on Gemma 3 4B (mlx-community repackaging tripped llama.cpp's
# tokenizer-hash whitelist). We will revisit Gemma 4 / Llama 4 once
# text-only checkpoints exist or mlx-lm grows multimodal LoRA support.
#
# WHY NOT LLAMA 3.1 8B? Bigger = slower; defeats the purpose of the
# fast tier. The fast router only needs to (a) classify the user's
# intent, (b) answer simple SQL/RAG questions from grounded context,
# (c) hand anything ambiguous to the heavy tier. 3B is plenty for
# (a)-(c) and gives us 2× the throughput.
#
# Alternatives if we ever want to revisit:
#   mlx-community/Llama-3.2-1B-Instruct-bf16      — smaller; for pipeline tests
#   mlx-community/Llama-3.1-8B-Instruct-bf16      — more headroom, ~50% slower
#   mlx-community/Qwen2.5-3B-Instruct-bf16        — Apache 2.0, strong at SQL
#   mlx-community/gemma-3-4b-it-bf16              — previous default; toolchain pain
#
# When Meta publishes a successor (Llama 3.3 small, Llama 5 text-only,
# etc.), flip the value here and re-run ./4_update_base_model.sh --force.
# The SHA tracker auto-detects new revisions of the SAME repo, but a
# new repo name needs a manual flip.
base_model: "mlx-community/Llama-3.2-3B-Instruct-bf16"

# Short, human-friendly name for the fine-tuned model. The pipeline appends
# the training date as a tag, so ollama ends up with e.g.
# `family-fast:2026-04-23`. A dated tag is deliberately immutable — never
# overwrite a working model in place; create a new tag and swap .env.
ollama_tag_base: "family-fast"

# The `latest` convenience tag. When set, the pipeline ALSO tags the most
# recent build as `<ollama_tag_base>:latest` so .env can pin it without
# editing on every retrain. Set to null to disable (you'll have to edit
# AI_FAMILY_QA_MODEL in .env after each run).
ollama_tag_latest: "latest"

# Where intermediate files land. Everything under artifacts/ is
# machine-specific and git-ignored. Relative paths resolve against
# scripts/ai_training/.
artifacts_dir: "./artifacts"

# --- Corpus dump (step 1) -------------------------------------------------
corpus:
  # Where 1_dump_corpus.py writes human-readable markdown + YAML it
  # extracted from the live app (schema, routers, tools, prompts).
  # Point at this directory to manually audit what the training data
  # sees before you commit to a fine-tune.
  output_dir: "./artifacts/corpus"

  # Root of the backend Python package the dump walks.
  api_package_dir: "../../python/api"

  # Glob patterns for routers + AI modules the dump should scan for
  # docstrings and function signatures. Everything else (database,
  # integrations, storage, utils) is summarised from its module-level
  # docstring only.
  include_globs:
    - "routers/*.py"
    - "ai/*.py"

# --- SFT dataset (step 2) -------------------------------------------------
sft:
  # Where 2_build_sft_dataset.py writes train.jsonl + valid.jsonl. This
  # is also the path mlx_lm.lora points `--data` at.
  output_dir: "./artifacts/dataset"

  # Fraction of examples held out for validation. MLX expects at least
  # a handful of valid rows to compute per-epoch loss; 0.05 on a few
  # thousand examples gives ~150 rows which is plenty.
  valid_split: 0.05

  # Hard cap on examples per source bucket. Prevents one overzealous
  # template from dominating the loss surface. Unlimited = null.
  #
  # `labeled` is your hand-curated gold data from
  # templates/labeled_examples.jsonl — the cap is intentionally high
  # because every row was reviewed by you and represents an exact
  # decision you want the model to make.
  max_per_bucket:
    schema_qa: 2000
    sql_patterns: 3000
    api_docs: 1000
    integrations: 500
    labeled: 2000
    negative: 300

# --- LoRA training (step 3) -----------------------------------------------
lora:
  # Rank of the LoRA adapter matrices. 8 is MLX-LM's default and what
  # we use here — gives the adapter enough capacity for our SFT
  # without making it heavy enough to overpower the base model's
  # pre-trained representations. We tried rank=16 + num_layers=all on
  # the first run and it caused catastrophic forgetting (model started
  # outputting 'SELECT' word salad after 100 steps even though val
  # loss kept dropping on our SQL templates).
  rank: 8

  # Which LoRA layers of the base transformer to train. mlx-lm's
  # default is the LAST 16 blocks; we stick with that. Llama 3.2 3B
  # has 28 layers total, so 16 covers the upper half — where most of
  # the task-specific representation lives. Adapting "all" layers on
  # the previous Gemma 3 4B run caused catastrophic forgetting (model
  # forgot how to speak English). Last-16 is the standard recipe for
  # SFT-on-top-of-IT.
  num_layers: 16

  # Passes over the full dataset. 1 epoch (1000 iters) is plenty for a
  # 1500-example dataset; we were using 3 epochs and overfitting hard.
  num_epochs: 1

  # Batch size per step. 4 is safe for a 4B model on 64 GB unified
  # memory; bump to 8 if you have a 128 GB Studio and want faster runs.
  # Default 8 since this rig is M4 Max / 128 GB.
  batch_size: 8

  # Learning rate. MLX-LM's recipe default is 1e-5; we use 5e-5 — a
  # gentle middle ground that learns the family-specific patterns
  # without destabilising the base model's language skills. The first
  # run used 2e-4 (default) and the loss curve showed clear instability
  # at iter 50-75 (loss spiked from 9.3 -> 13.8 -> 14.4 before
  # recovering), then "converged" by overwriting general capability.
  # If the resulting model under-fits our templates, raise to 1e-4.
  learning_rate: 5.0e-5

  # How often to log training loss (in steps). Low enough to see the
  # curve on a ~1000-step run.
  steps_per_report: 25

  # How often to run validation during training. Keeps the whole run
  # under ~15 min wall-clock on a Mac Studio.
  steps_per_eval: 200

  # Context length used during training. 2048 covers every example in
  # the corpus with headroom; bump to 4096 only if you add very long
  # exemplars.
  max_seq_length: 2048

# --- GGUF + Ollama conversion (step 3 continued) -------------------------
gguf:
  # llama.cpp quantisation. Q4_K_M is the Ollama default for a reason:
  # <10% perplexity loss vs fp16, ~2.5 GB for a 4B model, fast decode.
  quantisation: "Q4_K_M"

  # Where to clone llama.cpp for convert_hf_to_gguf.py + quantize. The
  # fine-tune script will `git pull` into this path on each run so we
  # track upstream Gemma support.
  llama_cpp_dir: "./artifacts/llama.cpp"

# --- Retrain-on-new-base tracker (step 4) --------------------------------
update_tracker:
  # File that stores the HF commit SHA we trained on last time. When
  # update_base_model.sh sees a newer SHA on HF, it re-runs the
  # pipeline. Delete this file to force a retrain.
  state_file: "./artifacts/base_model.state"
